<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給料管理</title>

<link rel="manifest" href="manifest.json">

<style>
* { box-sizing: border-box; }

body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
  margin: 0; /* 余計なマージンをカット */
}

/* タブ */
.tab {
  display: flex;
  flex-direction: row;
  gap: 8px;
  margin-bottom: 10px;
}

.tab button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #ddd;
  color: black;
}

/* 選択（給料計算 or レポート） */
.tab button.active {
  background: #007AFF;
  color: white;
}

/* 更新ボタン */
.tab button.update-btn {
  background: #ddd;
  color: #007AFF;
}

/* カード */
.card {
  background: white;
  padding: 15px; /* 少し広げると綺麗に見えます */
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden; /* 万が一の中身のはみ出しをカット */
}

/* 入力 */
input, select, button {
  display: block; /* ブロック要素化して確実に100%に */
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 10px;
  font-size: 16px;
  border: 1px solid #ddd; /* 枠線を明示 */
  border-radius: 6px;
  -webkit-appearance: none; /* iOS特有のスタイルをリセット */
  appearance: none;
}

/* 時間入力の高さ調整 */
input[type="time"] {
  height: 45px; /* iOSで文字が切れない適度な高さ */
  background: #fff;
}
/* チェック */
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox-label input { display:none; }

.checkmark {
  width: 20px;
  height: 20px;
  border: 2px solid #ccc;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.checkbox-label input:checked + .checkmark {
  background: #007AFF;
}

.checkbox-label input:checked + .checkmark::after {
  content: "✓";
  color: white;
  font-size: 14px;
}

/* カレンダー */
#calendar {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 3px;
}

.week {
  font-size: 11px;
  text-align: center;
}

.sun { color: red; }
.sat { color: red; }

.day {
  padding: 6px;
  text-align: center;
  background: #fff;
  border-radius: 5px;
  cursor: pointer;
}

.selected {
  background: #007AFF;
  color: white;
}

/* 一覧 */
.list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.list-item span {
  flex: 1;
}

.btn-group {
  display: flex;
  gap: 6px;
}

.btn-small {
  padding: 4px 8px;
  font-size: 13px;
  width: auto;
}

/* グラフ */
#chart {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 6px;
  align-items: end;
}

.bar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.bar {
  width: 100%;
  background: #007AFF;
  color: white;
  font-size: 10px;
  border-radius: 4px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.bar-month {
  font-size: 9px;
  margin-top: 2px;
}

button {
  background: #ddd;
  color: black;
}

button[onclick="calc()"],
button[onclick="saveData()"] {
  background: #007AFF;
  color: white;
}

input, select {
  color: black;
}

/* 年＋合計 */
.year-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

/* 年セレクト（小さく） */
#yearSelect {
  width: 110px;
  padding: 6px;
  font-size: 14px;
}

/* 合計（でかく） */
#yearTotal {
  font-size: 22px;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- タブ -->
<div class="tab">
  <button onclick="showPage('calc')" id="tabCalc" class="active">給料計算</button>
  <button onclick="showPage('report')" id="tabReport">レポート</button>
  <button onclick="location.reload()" class="update-btn">更新</button>
</div>

<!-- 計算ページ -->
<div id="calcPage">

<div class="card">
<h2>給料計算</h2>

開始 <input type="time" id="start">
終了 <input type="time" id="end">

<select id="type">
  <option value="1250">案内（1250円）</option>
  <option value="1300">運営（1300円）</option>
  <option value="1350">作業（1350円）</option>
</select>

<label class="checkbox-label">
  <input type="checkbox" id="manual">
  <span class="checkmark"></span>
  手入力
</label>

<div id="manualBox" style="display:none;">
<input type="number" id="manualPay" placeholder="金額入力">
</div>

<button onclick="calc()">計算</button>

<h3 id="result"></h3>
</div>

<div class="card">
<h2>一覧</h2>

<input type="month" id="monthPicker">

<div id="calendar"></div>

<button onclick="saveData()">保存</button>

<h3 id="total"></h3>
<ul id="list"></ul>

</div>

</div>

<!-- レポート -->
<div id="reportPage" style="display:none;">
<div class="card">

<div class="year-row">
  <select id="yearSelect"></select>
  <span id="yearTotal"></span>
</div>

<div id="chart"></div>

</div>
</div>

<!-- 月詳細 -->
<div id="monthPage" style="display:none;">
<div class="card">

<button onclick="backToReport()">←戻る</button>

<ul id="monthList"></ul>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
